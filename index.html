<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Button Clicker</title>
    </head>
    <body>
        <div id="top">
            <h1>Button Clicker</h1>
            <h2>Click the button as many times
                as you can in one minute!
            </h2>
        </div>
        <div>
            <h2>Timer</h2>
            <video width="320" height="240" controls>
                <source src="Countdown.mp4.mp4" type="video/mp4">
                Your browser does not support the video type.
            </video>
        </div>
        <div>
            <button>Click</button>
        </div>
    </body>
</html>
